<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ソフトテニス 練習試合システム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
let db = null;

// 変更後：Vercel等の環境から直接Firebaseに通信する
const FB_PROXY = 'https://softtennis-score-1d9b6-default-rtdb.asia-southeast1.firebasedatabase.app';
function xhrRequest(method, path, data) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    const url = `${FB_PROXY}/${path}.json?t=${Date.now()}`;
    xhr.open(method, url, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.timeout = 10000;
    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) {
        try { resolve(JSON.parse(xhr.responseText)); } catch(e) { resolve(null); }
      } else { 
        console.warn(`通信エラー: HTTP ${xhr.status} - ${path}`);
        showSync('offline');
        reject(new Error(`HTTP ${xhr.status}`)); 
      }
    };
    xhr.onerror = () => {
      console.warn('ネットワークエラー:', path);
      showSync('offline');
      reject(new Error('Network error'));
    };
    xhr.ontimeout = () => {
      console.warn('タイムアウト:', path);
      showSync('offline');
      reject(new Error('Timeout'));
    };
    xhr.send(data !== undefined ? JSON.stringify(data) : null);
  });
}

function loadFirebase() {
  db = true;
  showSync(navigator.onLine ? 'synced' : 'offline');
  return Promise.resolve();
}

const QUEUE_KEY = 'st_queue_v4';
const LOCAL_KEY = 'st_local_v4';
const EVENTS_KEY = 'st_events_v4';
function getQueue() { return JSON.parse(localStorage.getItem(QUEUE_KEY)||'[]'); }
function saveQueue(q) { localStorage.setItem(QUEUE_KEY,JSON.stringify(q)); }
function getLocal() { return JSON.parse(localStorage.getItem(LOCAL_KEY)||'{}'); }
function saveLocal(d) { localStorage.setItem(LOCAL_KEY,JSON.stringify(d)); }
function getLocalEvents() { return JSON.parse(localStorage.getItem(EVENTS_KEY)||'{}'); }
function saveLocalEvents(d) { localStorage.setItem(EVENTS_KEY,JSON.stringify(d)); }

let currentEventId = null;

function showSync(s) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const m = { synced:{t:'✓ 同期済み',c:'#7fc87f'}, syncing:{t:'⟳ 同期中',c:'#f0c040'}, offline:{t:'⚡ オフライン保存中',c:'#f0a040'} };
  el.textContent = (m[s]||m.synced).t; el.style.color = (m[s]||m.synced).c;
}

window.fbSaveEvent = async function(eventId, eventData) {
  const local = getLocalEvents(); local[eventId] = eventData; saveLocalEvents(local);
  if (navigator.onLine) {
    try { await xhrRequest('PUT', `events/${eventId}/info`, eventData); showSync('synced'); }
    catch(e) { console.warn('fbSaveEvent:', e); showSync('offline'); }
  }
};

window.fbGetEvents = async function() {
  if (navigator.onLine) {
    try {
      const raw = await xhrRequest('GET', 'events');
      const result = {};
      if (raw) Object.keys(raw).forEach(eid => { if (raw[eid] && raw[eid].info) result[eid] = raw[eid].info; });
      saveLocalEvents(result);
      return result;
    } catch(e) { console.warn('fbGetEvents:', e); }
  }
  return getLocalEvents();
};

window.fbSave = async function(courtId, data) {
  const eid = currentEventId || 'default';
  const key = eid + '/' + courtId;
  const local = getLocal(); local[key] = data; saveLocal(local);
  if (navigator.onLine) {
    try { await xhrRequest('PUT', `events/${eid}/courts/${courtId}`, data); showSync('synced'); }
    catch(e) { enqueue(key, data); }
  } else { enqueue(key, data); }
};

window.fbDelete = async function(courtId) {
  const eid = currentEventId || 'default';
  const key = eid + '/' + courtId;
  const local = getLocal(); delete local[key]; saveLocal(local);
  const q = getQueue().filter(x => x.id !== key); saveQueue(q);
  if (navigator.onLine) {
    try { await xhrRequest('DELETE', `events/${eid}/courts/${courtId}`); } catch(e) { console.warn(e); }
  }
};

function enqueue(id, data) {
  const q = getQueue(); const i = q.findIndex(x=>x.id==id);
  if (i>=0) q[i]={id,data}; else q.push({id,data});
  saveQueue(q); showSync('offline');
}

window.addEventListener('online', async () => {
  const q = getQueue(); if (!q.length) { showSync('synced'); return; }
  showSync('syncing');
  try {
    await Promise.all(q.map(x => {
      const parts = x.id.split('/');
      return xhrRequest('PUT', `events/${parts[0]}/courts/${parts[1]}`, x.data);
    }));
    saveQueue([]); showSync('synced');
    if (window._coachOpen) loadDashboard();
  } catch(e) { console.warn('Queue flush:', e); }
});
window.addEventListener('offline', () => showSync('offline'));

window.fbGetAll = async function() {
  const eid = currentEventId || 'default';
  if (navigator.onLine) {
    try {
      const data = await xhrRequest('GET', `events/${eid}/courts`);
      const d = data || {};
      const local = getLocal();
      Object.keys(d).forEach(k => local[eid+'/'+k] = d[k]);
      saveLocal(local);
      return d;
    } catch(e) { console.warn('fbGetAll:', e); }
  }
  return getLocalCourts(eid);
};

function getLocalCourts(eid) {
  const local = getLocal();
  const result = {};
  Object.keys(local).forEach(k => {
    if (k.startsWith(eid+'/')) result[k.replace(eid+'/','')] = local[k];
  });
  return result;
}

window.fbSaveAI = async function(id, text) {
  const eid = currentEventId || 'default';
  const key = eid + '/' + id;
  const local = getLocal();
  if (local[key]) { local[key].aiFeedback = text; saveLocal(local); }
  if (navigator.onLine) {
    try { await xhrRequest('PUT', `events/${eid}/courts/${id}/aiFeedback`, text); } catch(e) { console.warn(e); }
  }
};

document.addEventListener('DOMContentLoaded', async () => {
  showSync('offline');
  await loadFirebase();
  const q = getQueue();
  if (q.length && navigator.onLine && db) {
    showSync('syncing');
    Promise.all(q.map(x => {
      const parts = x.id.split('/');
      return xhrRequest('PUT', `events/${parts[0]}/courts/${parts[1]}`, x.data);
    })).then(() => { saveQueue([]); showSync('synced'); });
  }
  showEventPage();
});
</script>
<style>
/* ⑮ フォント刷新: Noto Sans JP + Montserrat + Oswald */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Montserrat:wght@400;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap');

:root {
  --bg:#f2f0eb; --surface:#fff; --s2:#f7f5f0; --border:#e0dbd3;
  --ink:#1a1a1a; --muted:#7a756c;
  --a:#1a4f8a; --b:#b92020;
  --green:#28823a; --amber:#c07800; --purple:#6b3fa0;
  --sh:0 2px 16px rgba(0,0,0,.06);
  --font-main:'Noto Sans JP', sans-serif;
  --font-num:'Montserrat', sans-serif;
  --font-head:'Oswald', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-main);background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}

/* NAV */
.top-nav{background:#111;color:#fff;display:flex;align-items:stretch;position:sticky;top:0;z-index:100}
.nav-logo{padding:13px 16px;font-size:14px;font-weight:700;font-family:var(--font-head);letter-spacing:.05em;border-right:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:7px;white-space:nowrap}
.nav-tabs{display:flex;flex:1}
.nav-tab{padding:13px 16px;font-size:13px;font-weight:500;color:rgba(255,255,255,.45);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap}
.nav-tab:hover{color:rgba(255,255,255,.8)}
.nav-tab.active{color:#fff;border-bottom-color:#7fc87f}
.nav-right{padding:0 12px;display:flex;align-items:center}
#sync-status{font-family:var(--font-num);font-size:10px;color:#7fc87f;white-space:nowrap}

/* PAGE */
.page{display:none;padding:14px;max-width:680px;margin:0 auto}
.page.active{display:block}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--sh);overflow:hidden;margin-bottom:14px}
.card-head{padding:10px 14px;background:var(--s2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-family:var(--font-head);font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}

/* BTN */
.btn{font-family:var(--font-main);font-size:13px;font-weight:500;padding:8px 14px;border-radius:7px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .14s}
.btn:hover{border-color:var(--ink);color:var(--ink)}
.btn.green{background:var(--green);color:#fff;border-color:var(--green)}
.btn.green:hover{background:#1e6d2f}
.btn.danger{border-color:var(--b);color:var(--b)}
.btn.sm{font-size:11px;padding:5px 10px}

/* INPUT */
input[type=text],textarea{font-family:var(--font-main);font-size:14px;padding:10px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;color:var(--ink);width:100%;transition:border-color .15s}
input[type=text]:focus,textarea:focus{outline:none;border-color:var(--green)}
input[type=text]::placeholder{color:var(--muted)}
textarea{resize:vertical;min-height:68px;font-size:13px;line-height:1.6}
label{font-size:11px;color:var(--muted);display:block;margin-bottom:5px;font-family:var(--font-head);letter-spacing:.1em;text-transform:uppercase}

/* COURT GRID */
.court-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px}
.court-card{border:2px solid var(--border);border-radius:10px;padding:14px 8px;text-align:center;cursor:pointer;transition:all .15s;background:var(--s2);-webkit-tap-highlight-color:transparent}
.court-card:active{transform:scale(.96)}
.court-card.active-match{border-color:var(--amber);background:#fffbf0}
.court-card.finished{border-color:var(--green);background:#f2faf2}
.court-num{font-family:var(--font-num);font-size:26px;font-weight:800;line-height:1;margin-bottom:5px}
.court-status{font-size:10px;color:var(--muted);font-family:var(--font-num);display:flex;align-items:center;justify-content:center;gap:4px}
.court-teams{font-size:11px;color:var(--ink);margin-top:5px;line-height:1.5}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.sd-empty{background:var(--border)}
.sd-active{background:var(--amber);animation:blink 1.4s infinite}
.sd-done{background:var(--green)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* SETUP */
.setup-body{padding:14px;display:flex;flex-direction:column;gap:10px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt-row{display:flex;gap:14px;flex-wrap:wrap}
.opt-group{display:flex;flex-direction:column;gap:5px}
.rbtn-row{display:flex;gap:5px}
.rbtn{font-size:12px;padding:6px 12px;border-radius:5px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .12s}
.rbtn.on{border-color:var(--green);color:var(--green);background:#f0faf0;font-weight:600}

/* SCOREBOARD */
.game-track{display:flex;align-items:center;justify-content:center;gap:5px;padding:10px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.gdot{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--font-num);font-weight:700}
.gdot.wa{background:var(--a);border-color:var(--a);color:#fff}
.gdot.wb{background:var(--b);border-color:var(--b);color:#fff}
.gdot.cur{border-color:var(--green);color:var(--green);background:#f0faf0}
.gdot.fin{border-color:var(--purple);color:var(--purple);background:#f5f0ff}

.score-display{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.score-side{padding:14px 10px;text-align:center}
.score-side-label{font-size:11px;font-weight:700;margin-bottom:4px}
.ssl-a{color:var(--a)} .ssl-b{color:var(--b)}
.score-pts{font-family:var(--font-num);font-size:56px;font-weight:800;line-height:1}
.sp-a{color:var(--a)} .sp-b{color:var(--b)}
.score-divider{border-right:1px solid var(--border)}
.deuce-strip{grid-column:1/-1;padding:6px;text-align:center;font-family:var(--font-num);font-size:11px;letter-spacing:.2em;text-transform:uppercase;border-top:1px solid var(--border);background:var(--s2);display:none}

/* POINT FLOW - ⑪ サーブ+ラリー同時表示 */
.point-flow{padding:14px;border-top:1px solid var(--border)}
.flow-step{margin-bottom:14px;animation:stepIn .2s ease}
@keyframes stepIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.step-label{font-family:var(--font-head);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.step-num{background:var(--ink);color:#fff;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.step-num.done{background:var(--green)}
.choice-grid{display:flex;flex-wrap:wrap;gap:6px}
.choice-btn{font-family:var(--font-num);font-size:13px;font-weight:600;padding:10px 14px;border-radius:8px;border:2px solid var(--border);background:var(--s2);color:var(--ink);cursor:pointer;transition:all .12s;-webkit-tap-highlight-color:transparent;min-width:52px;text-align:center;}
.choice-btn:active{transform:scale(.93)}
.choice-btn.selected{border-color:var(--green);background:#e8f5e9;color:var(--green);font-weight:700}
.choice-btn.selected-a{border-color:var(--a);background:rgba(26,79,138,.1);color:var(--a);font-weight:700}
.choice-btn.selected-b{border-color:var(--b);background:rgba(155,32,32,.1);color:var(--b);font-weight:700}
.choice-btn.fault{border-color:var(--amber);color:var(--amber)}
.choice-btn.fault.selected{background:rgba(184,122,0,.1)}
.choice-btn.choice-a{border-color:rgba(26,79,138,.3);color:var(--a)}
.choice-btn.choice-a.selected{border-color:var(--a);background:rgba(26,79,138,.1);font-weight:700}
.choice-btn.choice-b{border-color:rgba(155,32,32,.3);color:var(--b)}
.choice-btn.choice-b.selected{border-color:var(--b);background:rgba(155,32,32,.1);font-weight:700}
.choice-btn.choice-point{border-color:rgba(45,125,58,.4);color:var(--green)}
.choice-btn.choice-point.selected{border-color:var(--green);background:rgba(45,125,58,.1);font-weight:700}
.choice-btn.choice-miss{border-color:rgba(155,32,32,.3);color:var(--b)}
.choice-btn.choice-miss.selected{border-color:var(--b);background:rgba(155,32,32,.1);font-weight:700}
.choice-btn.choice-ace{border-color:rgba(184,122,0,.4);color:var(--amber)}
.choice-btn.choice-ace.selected{border-color:var(--amber);background:rgba(184,122,0,.1);font-weight:700}

/* ⑪ サーブ+ラリー同時表示レイアウト */
.serve-rally-row{display:grid;grid-template-columns:auto 1fr;gap:14px;margin-bottom:14px;animation:stepIn .2s ease}
.serve-rally-row .sr-section{display:flex;flex-direction:column;gap:6px}
.serve-rally-row .sr-label{font-family:var(--font-head);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}

.flow-summary{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--muted);font-family:var(--font-num);line-height:1.8;}
.flow-summary span{color:var(--ink);font-weight:600}
.confirm-btn{width:100%;padding:14px;font-family:var(--font-main);font-size:16px;font-weight:700;background:var(--ink);color:#fff;border:none;border-radius:8px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.confirm-btn:active{transform:scale(.97)}

/* ACTION BAR */
.action-bar{display:flex;gap:7px;padding:10px 14px;background:var(--s2);border-top:1px solid var(--border)}
.final-chip{font-size:10px;padding:2px 7px;border-radius:8px;background:rgba(107,63,160,.1);color:var(--purple);font-family:var(--font-num);border:1px solid rgba(107,63,160,.25)}

/* REFLECT */
.reflect-body{padding:14px;display:flex;flex-direction:column;gap:12px}
.reflect-q{font-size:14px;font-weight:700}
.stars{display:flex;gap:4px}
.star{font-size:28px;cursor:pointer;opacity:.3;transition:transform .1s}
.star.lit{opacity:1}

/* DASHBOARD */
.ms-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;box-shadow:var(--sh);animation:up .3s ease}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ms-head{padding:11px 14px;background:var(--s2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ms-court-label{font-family:var(--font-num);font-size:11px;color:var(--muted);letter-spacing:.1em}
.status-badge{font-size:10px;padding:3px 9px;border-radius:10px;font-family:var(--font-num);letter-spacing:.06em}
.sb-a{background:rgba(26,79,138,.1);color:var(--a)}
.sb-b{background:rgba(155,32,32,.1);color:var(--b)}
.sb-p{background:rgba(184,122,0,.1);color:var(--amber)}
.score-line{display:flex;align-items:center;gap:10px;padding:14px;border-bottom:1px solid var(--border)}
.sl-team{flex:1;font-size:14px;font-weight:700}
.sl-a{color:var(--a)} .sl-b{color:var(--b);text-align:right}
.sl-score{font-family:var(--font-num);font-size:28px;font-weight:800;white-space:nowrap}

/* PLAYER BLOCKS - ② DF項目削除済み */
.player-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px}
.player-block{border-radius:9px;padding:11px 12px;border:1.5px solid var(--border)}
.pb-team-a{border-color:rgba(26,79,138,.3);background:rgba(26,79,138,.04)}
.pb-team-b{border-color:rgba(155,32,32,.3);background:rgba(155,32,32,.04)}
.pb-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:6px}
.pb-name{font-size:13px;font-weight:700}
.pb-team-a .pb-name{color:var(--a)}
.pb-team-b .pb-name{color:var(--b)}
.pb-role{font-size:10px;color:var(--muted);font-family:var(--font-num)}
.pb-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:2px 0}
.pb-lbl{color:var(--muted);font-family:var(--font-num);font-size:10px}
.pb-val{font-weight:700;font-family:var(--font-num);font-size:12px}
.pb-val small{font-weight:400;color:var(--muted);font-size:10px}

/* RANKING */
.rank-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--sh);overflow:hidden;margin-bottom:14px}
.rank-section-head{padding:10px 14px;background:var(--s2);border-bottom:1px solid var(--border);font-family:var(--font-head);font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px}
.rank-medal{font-size:18px}
.rank-list{padding:6px 0}
.rank-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.rank-row:last-child{border-bottom:none}
.rank-pos{font-family:var(--font-num);font-size:18px;font-weight:800;width:28px;text-align:center;flex-shrink:0}
.rank-pos.p1{color:#c9a227}
.rank-pos.p2{color:#9e9e9e}
.rank-pos.p3{color:#a0522d}
.rank-name{flex:1;font-size:14px;font-weight:600}
.rank-sub{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--font-num)}
.rank-val{font-family:var(--font-num);font-size:20px;font-weight:800;color:var(--green)}
.rank-val-unit{font-size:10px;color:var(--muted);font-family:var(--font-num)}
.rank-bar-wrap{width:80px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:4px}
.rank-bar-fill{height:100%;background:var(--green);border-radius:3px;transition:width .5s}
.rank-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:14px;background:var(--surface);border-radius:12px 12px 0 0;overflow:hidden}
.rank-tab{flex:1;padding:11px 8px;text-align:center;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;font-family:var(--font-num)}
.rank-tab.active{color:var(--green);border-bottom-color:var(--green);background:#f5fdf5}
.rank-date-label{text-align:center;font-family:var(--font-num);font-size:11px;color:var(--muted);margin-bottom:12px}

/* PLAYER STATS */
.stats-player-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.stats-player-card:active{transform:scale(.98)}
.stats-player-card:hover{border-color:var(--green)}
.spc-name{font-size:15px;font-weight:700}
.spc-rate{font-family:var(--font-num);font-size:13px;color:var(--green);font-weight:700}
.spc-rate-sub{font-family:var(--font-num);font-size:10px;color:var(--muted)}
.stats-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--sh);overflow:hidden;margin-bottom:14px}
.stats-card-head{padding:10px 14px;background:var(--s2);border-bottom:1px solid var(--border);font-family:var(--font-head);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.stats-card-body{padding:14px}
.hbar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.hbar-label{font-family:var(--font-num);font-size:11px;font-weight:600;width:80px;text-align:right;flex-shrink:0}
.hbar-track{flex:1;height:22px;background:var(--bg);border-radius:4px;overflow:hidden;display:flex}
.hbar-seg{height:100%;transition:width .4s}
.hbar-val{font-family:var(--font-num);font-size:11px;font-weight:700;width:30px;flex-shrink:0}
.heat-table{width:100%;border-collapse:collapse;font-family:var(--font-num);font-size:12px}
.heat-table th{padding:6px 8px;font-weight:600;background:var(--s2);border:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.05em}
.heat-table td{padding:6px 8px;text-align:center;border:1px solid var(--border);font-weight:700;transition:background .3s}
.heat-table td.heat-0{background:transparent}
.heat-table td.heat-1{background:rgba(185,32,32,.08)}
.heat-table td.heat-2{background:rgba(185,32,32,.18)}
.heat-table td.heat-3{background:rgba(185,32,32,.30);color:#fff}
.heat-table td.heat-4{background:rgba(185,32,32,.50);color:#fff}
.rally-bar-wrap{display:flex;align-items:flex-end;gap:4px;height:120px;padding:0 4px}
.rally-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.rally-bar{width:100%;border-radius:4px 4px 0 0;background:var(--b);transition:height .4s;min-width:20px}
.rally-bar-num{font-family:var(--font-num);font-size:11px;font-weight:700;margin-bottom:2px}
.rally-bar-lbl{font-family:var(--font-num);font-size:10px;color:var(--muted);margin-top:4px}
.donut-wrap{display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap}
.donut-legend{display:flex;flex-direction:column;gap:6px}
.donut-legend-item{display:flex;align-items:center;gap:8px;font-size:12px;font-family:var(--font-num)}
.donut-legend-color{width:14px;height:14px;border-radius:3px;flex-shrink:0}

/* AI */
.ai-section{padding:13px 14px;border-top:1px solid var(--border)}
.ai-head{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.ai-badge{font-family:var(--font-num);font-size:10px;background:var(--ink);color:#fff;padding:3px 8px;border-radius:3px;letter-spacing:.1em}
.ai-body{font-size:13px;line-height:1.85}
.rv{padding:12px 14px;border-top:1px solid var(--border)}
.rv-stars{font-size:18px;margin-bottom:7px}
.rv-block{font-size:12px;line-height:1.7;background:var(--s2);border-radius:6px;padding:8px 11px;border:1px solid var(--border);margin-bottom:6px}

/* OTHERS */
.empty{padding:48px 20px;text-align:center;color:var(--muted);font-size:13px;line-height:1.8}
.empty-icon{font-size:40px;margin-bottom:12px}
.sec-title{font-family:var(--font-head);font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding:0 2px}

/* EVENT LIST */
.event-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;margin-bottom:10px}
.event-card:active{transform:scale(.98)}
.event-card.active-event{border-color:var(--green);background:#f5fdf5}
.event-name{font-size:16px;font-weight:700;margin-bottom:4px}
.event-meta{font-size:11px;color:var(--muted);font-family:var(--font-num)}
.event-new-btn{width:100%;padding:14px;background:#111;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-main);margin-bottom:14px;-webkit-tap-highlight-color:transparent}
.event-new-btn:active{transform:scale(.98)}
.current-event-bar{background:var(--green);color:#fff;padding:8px 14px;font-size:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.current-event-name{font-weight:700;font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.change-event-btn{font-size:11px;padding:4px 10px;border-radius:5px;border:1px solid rgba(255,255,255,.4);background:transparent;color:#fff;cursor:pointer;white-space:nowrap;font-family:var(--font-num)}
</style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-logo">🎾 TAKADA.st  ∼Embrace the moment∼</div>
  <div class="nav-tabs" id="main-nav-tabs" style="display:none">
    <div class="nav-tab active" onclick="showPage('player',this)">スコア入力</div>
    <div class="nav-tab" onclick="showPage('coach',this)">試合結果</div>
    <div class="nav-tab" onclick="showPage('ranking',this)">🏆 ランキング</div>
    <div class="nav-tab" onclick="showPage('stats',this)">📊 スタッツ</div>
  </div>
  <div class="nav-right"><span id="sync-status">確認中...</span></div>
</nav>

<div class="current-event-bar" id="current-event-bar" style="display:none">
  <span style="font-size:11px;opacity:.7">📅 イベント：</span>
  <span class="current-event-name" id="current-event-name"></span>
  <button class="change-event-btn" onclick="showEventPage()">変更</button>
</div>

<div class="page active" id="page-events">
  <div style="padding:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="sec-title" style="margin-bottom:0">イベントを選んでください</div>
      <button class="btn sm" onclick="loadEventList()">🔄 更新</button>
    </div>
    <button class="event-new-btn" onclick="toggleEventForm()">＋ 新しいイベントを作成</button>
    <div id="event-form" style="display:none; margin-bottom:14px;">
      <div style="display:flex;flex-direction:column;gap:10px; padding:14px; background:var(--surface); border:1px solid var(--border); border-radius:12px;">
        <div><label>大会・練習名</label><input type="text" id="ev-name" placeholder="例：春季練習試合、○○大会"></div>
        <div><label>日付</label><input type="text" id="ev-date" placeholder="例：2026/03/24"></div>
        <button class="btn green" style="width:100%;padding:12px;font-size:14px;font-weight:700" onclick="createNewEvent()">作成してこのイベントで開始</button>
      </div>
    </div>
    <div id="event-list"></div>
  </div>
</div>

<div class="page" id="page-player">
  <div id="step-court">
    <div class="card">
      <div class="card-head">
        <span class="card-title">コートを選んでください</span>
        <button class="btn sm" onclick="loadCourts()">🔄 更新</button>
      </div>
      <div class="court-grid" id="court-grid"></div>
    </div>
  </div>

  <div id="step-setup" style="display:none">
    <div class="card">
      <div class="card-head">
        <button class="btn sm" onclick="goStep('court')">← 戻る</button>
        <span class="card-title" id="setup-label">コート設定</span>
        <span></span>
      </div>
      <div class="setup-body">
        <div style="display:flex;gap:6px;margin-bottom:4px">
          <div style="flex:1">
            <label>チームA</label>
            <div class="rbtn-row" style="margin-bottom:8px">
              <button class="rbtn on" id="team-a-own" onclick="setTeamType('a',true,this)">🏠 自チーム</button>
              <button class="rbtn" id="team-a-opp" onclick="setTeamType('a',false,this)">🏁 相手</button>
            </div>
          </div>
          <div style="flex:1">
            <label>チームB</label>
            <div class="rbtn-row" style="margin-bottom:8px">
              <button class="rbtn on" id="team-b-own" onclick="setTeamType('b',true,this)">🏠 自チーム</button>
              <button class="rbtn" id="team-b-opp" onclick="setTeamType('b',false,this)">🏁 相手</button>
            </div>
          </div>
        </div>
        <div class="two-col">
          <div><label>チームA 後衛</label><input type="text" id="s-a1" placeholder="氏名"></div>
          <div><label>チームA 前衛</label><input type="text" id="s-a2" placeholder="氏名"></div>
          <div><label>チームB 後衛</label><input type="text" id="s-b1" placeholder="氏名"></div>
          <div><label>チームB 前衛</label><input type="text" id="s-b2" placeholder="氏名"></div>
        </div>
        <div class="opt-row">
          <div class="opt-group">
            <label>マッチ形式</label>
            <div class="rbtn-row">
              <button class="rbtn" onclick="setC('match',5,this)">5G</button>
              <button class="rbtn on" onclick="setC('match',7,this)">7G</button>
            </div>
          </div>
          <div class="opt-group">
            <label>先サーブ（ペア）</label>
            <div class="rbtn-row">
              <button class="rbtn on" onclick="setC('serve','a',this)">Aペア</button>
              <button class="rbtn" onclick="setC('serve','b',this)">Bペア</button>
            </div>
          </div>
        </div>
        <button class="btn green" style="width:100%;padding:14px;font-size:15px;font-weight:700" onclick="startMatch()">試合開始</button>
      </div>
    </div>
  </div>

  <div id="step-score" style="display:none">
    <div class="card">
      <div class="card-head">
        <span class="card-title" id="score-label">コート</span>
        <div style="display:flex;align-items:center;gap:7px">
          <span id="final-chip" class="final-chip" style="display:none">ファイナル</span>
          <span id="game-score-disp" style="font-size:12px;color:var(--muted);font-family:var(--font-num)"></span>
        </div>
      </div>

      <div class="game-track" id="game-track"></div>

      <div class="score-display" id="score-display-wrap">
        <div class="score-side score-divider" id="tap-a-side">
          <div class="score-side-label ssl-a" id="lbl-a">A</div>
          <div class="score-pts sp-a" id="pt-a">0</div>
          <div class="score-tap-hint" id="tap-hint-a" style="display:none;font-size:11px;color:var(--muted)">タップでポイント</div>
        </div>
        <div class="score-side" id="tap-b-side">
          <div class="score-side-label ssl-b" id="lbl-b">B</div>
          <div class="score-pts sp-b" id="pt-b">0</div>
          <div class="score-tap-hint" id="tap-hint-b" style="display:none;font-size:11px;color:var(--muted)">タップでポイント</div>
        </div>
        <div class="deuce-strip" id="deuce-strip">DEUCE</div>
      </div>

      <div class="point-flow" id="point-flow"></div>

      <div class="action-bar">
        <button class="btn sm" onclick="undoPt()">↩ 戻す</button>
        <button class="btn sm" onclick="toggleServe()">🔄 サーブ</button>
        <button class="btn sm" id="mode-btn" onclick="toggleMode()" style="margin-left:auto">📝 詳細入力</button>
        <button class="btn sm danger" onclick="endEarly()">試合終了</button>
      </div>
    </div>

    <div class="card" id="reflect-card" style="display:none">
      <div class="card-head"><span class="card-title">振り返り</span></div>
      <div class="reflect-body">
        <div class="reflect-q">今日の試合のパフォーマンスは？</div>
        <div class="stars" id="stars">
          <span class="star" onclick="setStar(1)">⭐</span>
          <span class="star" onclick="setStar(2)">⭐</span>
          <span class="star" onclick="setStar(3)">⭐</span>
          <span class="star" onclick="setStar(4)">⭐</span>
          <span class="star" onclick="setStar(5)">⭐</span>
        </div>
        <div><label>良かった点</label><textarea id="r-good" placeholder="例: セカンドサーブが安定していた"></textarea></div>
        <div><label>改善したい点</label><textarea id="r-improve" placeholder="例: ネット前のボレーが不安定だった"></textarea></div>
        <div><label>次の練習の目標</label><textarea id="r-goal" placeholder="例: バックハンドの精度を上げる"></textarea></div>
        <button class="btn green" style="width:100%" onclick="saveReflect()">振り返りを保存する</button>
      </div>
    </div>
  </div>
</div>

<div class="page" id="page-coach">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <div class="sec-title">全コート サマリー</div>
    <button class="btn sm green" onclick="loadDashboard()">🔄 更新</button>
  </div>
  <div id="coach-list"></div>
  <div id="coach-ranks"></div>
</div>

<div class="page" id="page-ranking">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <div class="sec-title">🏆 本日のランキング</div>
    <button class="btn sm green" onclick="loadRanking()">🔄 更新</button>
  </div>
  <div id="ranking-content"></div>
</div>

<div class="page" id="page-stats">
  <div id="stats-list-view">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="sec-title">📊 プレーヤースタッツ</div>
      <button class="btn sm green" onclick="loadStatsPlayerList()">🔄 更新</button>
    </div>
    <div id="stats-player-list"></div>
  </div>
  <div id="stats-detail-view" style="display:none">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <button class="btn sm" onclick="backToStatsList()">← 一覧へ</button>
      <div class="sec-title" style="margin-bottom:0" id="stats-player-name"></div>
    </div>
    <div style="margin-bottom:14px">
      <select id="stats-match-filter" onchange="renderStatsDetail()" style="font-family:var(--font-main);font-size:13px;padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;background:var(--surface);color:var(--ink);width:100%">
        <option value="all">すべての試合</option>
      </select>
    </div>
    <div id="stats-charts"></div>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let currentCourt = null;
let cfg = { match: 7, serve: 'a', servePlayer: 'a1', servePlayerB: 'b1', isOwnA: true, isOwnB: true };
let M = null;
let stk = [];
let starVal = 0;
let simpleMode = true;
window._coachOpen = false;

let flow = {
  serve: null, rally: null, shot: null, course: null, result: null, winner: null
};

// ============================================================
// EVENTS PAGE
// ============================================================
function showEventPage() {
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  document.getElementById('page-events').classList.add('active');
  document.getElementById('main-nav-tabs').style.display = 'none';
  document.getElementById('current-event-bar').style.display = 'none';
  loadEventList();
}

function toggleEventForm() {
  const f = document.getElementById('event-form');
  if (!f) return;
  if (f.style.display === 'none' || f.style.display === '') {
    f.style.display = 'block';
    const d = document.getElementById('ev-date');
    if (d) d.value = new Date().toLocaleDateString('ja-JP');
  } else {
    f.style.display = 'none';
  }
}

function createNewEvent() {
  const name = document.getElementById('ev-name').value.trim();
  const date = document.getElementById('ev-date').value.trim();
  if (!name) { alert('大会・練習名を入力してください'); return; }
  const eid = 'ev_' + Date.now();
  const eventData = { name, date: date || new Date().toLocaleDateString('ja-JP'), createdAt: new Date().toISOString() };
  window.fbSaveEvent(eid, eventData);
  selectEvent(eid, eventData);
}

async function loadEventList() {
  const el = document.getElementById('event-list');
  if (!el) return;
  el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">読み込み中...</div>';

  if (!db) {
    await Promise.race([loadFirebase(), new Promise(r => setTimeout(r, 5000))]);
  }

  let events = {};
  try { events = await window.fbGetEvents(); } catch(e) { events = getLocalEvents(); }

  const keys = Object.keys(events).sort((a,b) => (events[b].createdAt||'') > (events[a].createdAt||'') ? 1 : -1);
  if (!keys.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📅</div>まだイベントがありません<br>上のボタンから作成してください</div>';
    return;
  }
  
  el.innerHTML = keys.map(eid => {
    const ev = events[eid];
    const isActive = eid === currentEventId;
    return `<div class="event-card ${isActive?'active-event':''}" style="position:relative">
      <div onclick="selectEventById('${eid}')" style="flex:1;cursor:pointer">
        <div class="event-name">${ev.name}${isActive?' ✓':''}</div>
        <div class="event-meta">📅 ${ev.date||''}</div>
      </div>
      <button onclick="deleteEvent(event,'${eid}')" style="position:absolute;top:10px;right:10px;font-size:11px;padding:4px 9px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:var(--font-num)">🗑</button>
    </div>`;
  }).join('');
}

async function selectEventById(eid) {
  const events = await window.fbGetEvents();
  const eventData = events[eid];
  if (eventData) {
    selectEvent(eid, eventData);
  } else {
    alert('イベントデータの取得に失敗しました');
  }
}

async function deleteEvent(e, eid) {
  e.stopPropagation();
  if (!confirm('本当にこのイベントを削除しますか？\n（サーバーからも完全に消去されます）')) return;
  const local = getLocalEvents();
  delete local[eid]; 
  saveLocalEvents(local);
  if (navigator.onLine) {
    try { await xhrRequest('DELETE', `events/${eid}`); } catch (error) { console.error(error); }
  }
  if (currentEventId === eid) {
    currentEventId = null;
    document.getElementById('current-event-bar').style.display = 'none';
    document.getElementById('main-nav-tabs').style.display = 'none';
  }
  loadEventList();
}

function selectEvent(eid, eventData) {
  currentEventId = eid;
  document.getElementById('current-event-name').textContent = `${eventData.date||''} ${eventData.name}`;
  document.getElementById('current-event-bar').style.display = 'flex';
  document.getElementById('main-nav-tabs').style.display = 'flex';
  document.getElementById('event-form').style.display = 'none';
  
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
  document.getElementById('page-player').classList.add('active');
  document.querySelectorAll('#main-nav-tabs .nav-tab')[0].classList.add('active');
  
  window._coachOpen = false;
  loadCourts();
  goStep('court');
}

// ============================================================
// NAV & PAGES
// ============================================================
function showPage(p, el) {
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  if (el) el.classList.add('active');
  window._coachOpen = p === 'coach';
  
  if (p === 'coach') loadDashboard();
  if (p === 'player') { loadCourts(); goStep('court'); }
  if (p === 'ranking') loadRanking();
  if (p === 'stats') loadStatsPlayerList();
}

function goStep(s) {
  ['court','setup','score'].forEach(x => {
    document.getElementById('step-' + x).style.display = x === s ? '' : 'none';
  });
  if (s === 'court') loadCourts();
}

// ============================================================
// COURTS
// ============================================================
async function loadCourts() {
  const all = await window.fbGetAll();
  const grid = document.getElementById('court-grid');
  grid.innerHTML = '';
  for (let i = 1; i <= 6; i++) {
    const d = all[i];
    const div = document.createElement('div');
    let cls = 'court-card', sh = '';
    if (!d) {
      sh = `<div class="court-status"><span class="sdot sd-empty"></span>空き</div>`;
    } else if (d.finished) {
      cls += ' finished';
      sh = `<div class="court-status"><span class="sdot sd-done"></span>終了</div><div class="court-teams">${d.teams.a.name}<br>vs<br>${d.teams.b.name}</div>`;
    } else {
      cls += ' active-match';
      sh = `<div class="court-status"><span class="sdot sd-active"></span>試合中</div><div class="court-teams">${d.teams.a.name}<br>vs<br>${d.teams.b.name}</div>`;
    }
    div.className = cls;
    div.innerHTML = `<div class="court-num">${i}</div>${sh}`;
    div.onclick = () => selectCourt(i, d);
    grid.appendChild(div);
  }
}

function selectCourt(id, d) {
  currentCourt = id;
  if (d && !d.finished) {
    M = d; stk = [];
    simpleMode = true;
    goStep('score'); renderScore(); renderFlow();
    setTimeout(updateModeUI, 100);
    return;
  }
  if (d && d.finished) {
    showCourtConfirm(id);
    return;
  }
  document.getElementById('setup-label').textContent = `コート ${id} 設定`;
  ['s-a1','s-a2','s-b1','s-b2'].forEach(x => document.getElementById(x).value = '');
  resetCfg();
  goStep('setup');
}

function resetCfg() {
  cfg = { match: 7, serve: 'a', isOwnA: true, isOwnB: true };
  document.querySelectorAll('[onclick^="setC(\'match\'"]').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('[onclick^="setC(\'serve\'"]').forEach(b => b.classList.remove('on'));
  const m7 = document.querySelector('[onclick="setC(\'match\',7,this)"]');
  const sa = document.querySelector('[onclick="setC(\'serve\',\'a\',this)"]');
  if (m7) m7.classList.add('on');
  if (sa) sa.classList.add('on');
  // 自チーム/相手トグルもリセット
  const aOwn = document.getElementById('team-a-own');
  const aOpp = document.getElementById('team-a-opp');
  const bOwn = document.getElementById('team-b-own');
  const bOpp = document.getElementById('team-b-opp');
  if (aOwn) { aOwn.classList.add('on'); aOpp.classList.remove('on'); }
  if (bOwn) { bOwn.classList.add('on'); bOpp.classList.remove('on'); }
}

function setTeamType(team, isOwn, btn) {
  if (team === 'a') cfg.isOwnA = isOwn;
  else cfg.isOwnB = isOwn;
  btn.closest('.rbtn-row').querySelectorAll('.rbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

function showCourtConfirm(id) {
  const grid = document.getElementById('court-grid');
  const old = document.getElementById('court-confirm-box');
  if (old) old.remove();

  const box = document.createElement('div');
  box.id = 'court-confirm-box';
  box.style.cssText = 'background:#fff;border:2px solid var(--amber);border-radius:10px;padding:14px;margin:10px 0;text-align:center';
  box.innerHTML = `
    <div style="font-size:13px;margin-bottom:12px;font-weight:600">コート${id}の試合は終了しています。<br>新しい試合を始めますか？</div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button onclick="document.getElementById('court-confirm-box').remove()" style="padding:9px 18px;border-radius:7px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer">キャンセル</button>
      <button onclick="startNewOnCourt(${id})" style="padding:9px 18px;border-radius:7px;border:none;background:var(--green);color:#fff;font-size:13px;font-weight:700;cursor:pointer">新しい試合を開始</button>
    </div>
  `;
  grid.parentNode.insertBefore(box, grid.nextSibling);

}

function startNewOnCourt(id) {
  const old = document.getElementById('court-confirm-box');
  if (old) old.remove();
  currentCourt = id;
  document.getElementById('setup-label').textContent = `コート ${id} 設定`;
  ['s-a1','s-a2','s-b1','s-b2'].forEach(x => document.getElementById(x).value = '');
  resetCfg();
  goStep('setup');
}

function setC(key, val, btn) {
  cfg[key] = val;
  btn.closest('.rbtn-row').querySelectorAll('.rbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

// ============================================================
// POINT FLOW  — ⑥⑦⑧⑨⑪⑫⑬ を反映
// ============================================================
function resetFlow() {
  flow = {
    serverKey: getCurrentServer(),
    serve: null, rally: null, player: null, type: null, base: null,
    shotType: null, course: null, isWinner: null, miss: null, winner: null
  };
}

function getCurrentServer() {
  if (!M) return null;
  const pts = M.isFinal 
    ? ((M.finalPts?.a || 0) + (M.finalPts?.b || 0))
    : ((M.pts?.a || 0) + (M.pts?.b || 0));

  if (!M.isFinal) {
    const team = M.serving; 
    const playerIndex = Math.floor(pts / 2) % 2; 
    return team + (playerIndex === 0 ? '1' : '2');
  } else {
    const finalCycle = Math.floor(pts / 2) % 4;
    const first = M.serving;  // ファイナルの先サーブチーム
    const second = first === 'a' ? 'b' : 'a';
    const finalOrder = [first+'1', second+'1', first+'2', second+'2'];
    return finalOrder[finalCycle];
  }
}

function getServerName() {
  if (!M) return '';
  const serverKey = getCurrentServer();
  if (!serverKey) return '';
  const teamKey = serverKey.startsWith('a') ? 'a' : 'b';
  const playerIdx = serverKey.endsWith('1') ? 0 : 1;
  const team = M.teams[teamKey];
  if (!team || !team.players) return '';
  const players = team.players.split(' / ');
  return players[playerIdx] || '';
}

function setFlow(key, val) {
  const order = ['serve','rally','player','type','base','shotType','course','isWinner','miss'];
  const idx = order.indexOf(key);
  if (idx >= 0) {
    order.slice(idx+1).forEach(k => flow[k] = null);
  }
  flow.winner = null; 
  flow[key] = val;
  renderFlow();
}

// ⑪ サーブ+ラリー同時選択用
function setServeRally(key, val) {
  flow[key] = val;
  // 両方揃ったら次に進む
  if (flow.rally !== null) {
    renderFlow();
  } else {
    // サーブだけ選んだ、ラリーはまだ → 再描画して選択状態を反映
    renderFlow();
  }
}

function renderFlow() {
  const el = document.getElementById('point-flow');
  if (!M || M.finished) { el.innerHTML = ''; return; }

  if (simpleMode) {
    el.innerHTML = `<div style="padding:10px 0 4px;text-align:center;font-size:12px;color:var(--muted);font-family:var(--font-num);letter-spacing:.1em">簡易入力モード：スコア数字をタップ</div>`;
    return;
  }

  const tA = M.teams.a.name;
  const tB = M.teams.b.name;
  const players = M.teams.a.players.split(' / ');
  const p1A = players[0] || '後衛A';
  const p2A = players[1] || '前衛A';
  const playersB = M.teams.b.players.split(' / ');
  const p1B = playersB[0] || '後衛B';
  const p2B = playersB[1] || '前衛B';

  const pName = (p) => p==='a1'?p1A:p==='a2'?p2A:p==='b1'?p1B:p2B;

  let html = '';
  let step = 1;

  const currentServerKey = flow.serverKey || getCurrentServer();
  const serverName = pName(currentServerKey);
  const isTeamA = currentServerKey.startsWith('a');
  const serverTeam = isTeamA ? tA : tB;
  const boxColor = isTeamA ? 'var(--a)' : 'var(--b)';

  // ============ ⑪ サーブ種別 + ラリー本数を同時表示 ============
  // サーブ: デフォルトは1st（⑪: 1stボタン削除、2ndとDFのみ）
  // ラリー本数を同時に表示
  const serveSel = flow.serve;
  const rallySel = flow.rally;

  html += `<div style="margin-bottom:6px;padding:8px 10px;background:${isTeamA?'rgba(26,79,138,.05)':'rgba(155,32,32,.05)'};border:1px solid ${isTeamA?'rgba(26,79,138,.15)':'rgba(155,32,32,.15)'};border-radius:8px;font-size:12px;color:${boxColor};font-weight:600">
    🎾 サーバー: ${serverName} (${serverTeam})
  </div>`;

  // サーブ種別（⑪: 2ndとDFのみ。何も押さなければ1st扱い）
  html += `<div class="serve-rally-row">
    <div class="sr-section">
      <div class="sr-label">サーブ</div>
      <div class="choice-grid">
        <button class="choice-btn${serveSel==='2nd'?' selected':''}" onclick="setServeRally('serve','2nd')">2nd</button>
        <button class="choice-btn${serveSel==='fault'?' fault selected':''}" onclick="setFlow('serve','fault')">DF</button>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:3px">※ 押さなければ1st扱い</div>
    </div>
    <div class="sr-section">
      <div class="sr-label">ラリー本数</div>
      <div class="choice-grid">
        <button class="choice-btn${rallySel==='1'?' selected':''}" onclick="setServeRally('rally','1')">1</button>
        <button class="choice-btn${rallySel==='2'?' selected':''}" onclick="setServeRally('rally','2')">2</button>
        <button class="choice-btn${rallySel==='3'?' selected':''}" onclick="setServeRally('rally','3')">3</button>
        <button class="choice-btn${rallySel==='4'?' selected':''}" onclick="setServeRally('rally','4')">4</button>
        <button class="choice-btn${rallySel==='5'?' selected':''}" onclick="setServeRally('rally','5')">5</button>
        <button class="choice-btn${rallySel==='6+'?' selected':''}" onclick="setServeRally('rally','6+')">6+</button>
      </div>
    </div>
  </div>`;

  // --- DF選択時: 即確定 ---
  if (flow.serve === 'fault') {
    const w = M.serving === 'a' ? 'b' : 'a';
    html += buildSummary(['DF', `${w==='a'?tA:tB} ポイント`]);
    html += `<button class="confirm-btn" onclick="commitFault()">✔ 確定してポイント追加</button>`;
    el.innerHTML = html; return;
  }

  // ラリーが未選択なら待つ
  if (!flow.rally) { el.innerHTML = html; return; }

  // サーブが未選択なら「1st」として扱う（⑪デフォルト論理）
  if (!flow.serve) flow.serve = '1st';

  // ============ ⑥ SA自動確定: 1stサーブ + ラリー1本 → SA即確定 ============
  if (flow.serve === '1st' && flow.rally === '1') {
    // SAしかあり得ない → コース選択だけしてもらう
    html += buildStep(step++, 'コース', flow.course !== null, [
      { val:'C', label:'C クロス' }, { val:'Co', label:'Co 逆クロス' },
      { val:'M', label:'M ミドル' }, { val:'RST', label:'右ST' }, { val:'LST', label:'左ST' }
    ], 'course', flow.course);
    if (!flow.course) { el.innerHTML = html; return; }
    const servKey = currentServerKey;
    flow.player = servKey;
    flow.type = 'point';
    flow.base = 'SA';
    flow.winner = servKey.startsWith('a') ? 'a' : 'b';
    html += buildSummary(['1st', '1球', pName(servKey), 'SA', flow.course]);
    html += `<button class="confirm-btn" onclick="commitCurrentFlow()">✔ 確定してポイント追加</button>`;
    el.innerHTML = html; return;
  }

  // ============ ⑦ ラリー2本 → レシーバーに確定 ============
  if (flow.rally === '2') {
    // レシーバー = サーバーの相手チーム
    const serverTeamKey = currentServerKey.startsWith('a') ? 'a' : 'b';
    const receiverTeam = serverTeamKey === 'a' ? 'b' : 'a';
    // レシーバーは後衛（1）がデフォルト
    const receiverKey = receiverTeam + '1';
    
    // レシーバーの成功/失敗を選択
    html += buildStep(step++, `レシーブ結果 (${pName(receiverKey)})`, flow.type !== null, [
      { val:'point', label:'✔ レシーブエース', cls:'choice-point' },
      { val:'miss',  label:'✘ レシーブミス',  cls:'choice-miss' }
    ], 'type', flow.type);
    if (!flow.type) { el.innerHTML = html; return; }

    flow.player = receiverKey;
    flow.base = flow.type === 'point' ? 'ReA' : 'Re';

    if (flow.type === 'point') {
      // レシーブエース → コース選択
      html += buildStep(step++, 'コース', flow.course !== null, [
        { val:'C', label:'C クロス' }, { val:'Co', label:'Co 逆クロス' },
        { val:'M', label:'M ミドル' }, { val:'RST', label:'右ST' }, { val:'LST', label:'左ST' }
      ], 'course', flow.course);
      if (!flow.course) { el.innerHTML = html; return; }
      flow.winner = receiverKey.startsWith('a') ? 'a' : 'b';
      html += buildSummary([flow.serve, '2球', pName(receiverKey), 'ReA', flow.course]);
      html += `<button class="confirm-btn" onclick="commitCurrentFlow()">✔ 確定してポイント追加</button>`;
      el.innerHTML = html; return;
    } else {
      // レシーブミス → ミス種類
      html += buildStep(step++, 'ミスの種類', flow.miss !== null, [
        { val:'N',  label:'N ネット',       cls:'choice-miss' },
        { val:'SO', label:'SO サイドアウト', cls:'choice-miss' },
        { val:'BO', label:'BO バックアウト', cls:'choice-miss' },
        { val:'T',  label:'T チップ',       cls:'choice-miss' }
      ], 'miss', flow.miss);
      if (!flow.miss) { el.innerHTML = html; return; }
      flow.winner = receiverKey.startsWith('a') ? 'b' : 'a';
      html += buildSummary([flow.serve, '2球', pName(receiverKey), 'Re ミス', flow.miss, `→${flow.winner==='a'?tA:tB}ポイント`]);
      html += `<button class="confirm-btn" onclick="commitCurrentFlow()">✔ 確定してポイント追加</button>`;
      el.innerHTML = html; return;
    }
  }

  // ============ ラリー3本以上: ⑧ SA/ReA/Re を除外 ============
  // プレーヤー選択
  html += buildStep(step++, 'プレーヤー（決着）', flow.player !== null, [
    { val:'a1', label:p1A, cls:'choice-a' },
    { val:'a2', label:p2A, cls:'choice-a' },
    { val:'b1', label:p1B, cls:'choice-b' },
    { val:'b2', label:p2B, cls:'choice-b' }
  ], 'player', flow.player);
  if (!flow.player) { el.innerHTML = html; return; }

  // ⑫ ポイント/ミスの分離
  html += buildStep(step++, 'ポイント or ミス', flow.type !== null, [
    { val:'point', label:'✔ ポイント', cls:'choice-point' },
    { val:'miss',  label:'✘ ミス',    cls:'choice-miss' }
  ], 'type', flow.type);
  if (!flow.type) { el.innerHTML = html; return; }

  // ⑫ ポイント時: 決着ショット（⑧ SA/ReA/Reを除外）
  if (flow.type === 'point') {
    if (!flow.base) {
      html += buildStep(step++, '決着ショット', false, [
        { val:'F', label:'F フォア' },
        { val:'B', label:'B バック' }
      ], 'base', flow.base);
      el.innerHTML = html; return;
    }

    // ⑬ LV追加、⑨ ストロークでもコース選択を強制
    html += buildStep(step++, 'ショット種類', flow.shotType !== null, [
      { val:'St', label:'St ストローク' }, { val:'S',  label:'S スライス' },
      { val:'V',  label:'V ボレー' },      { val:'LV', label:'LV ローボレー' },
      { val:'Hv', label:'Hv ハイボレー' }, { val:'Sm', label:'Sm スマッシュ' }
    ], 'shotType', flow.shotType);
    if (!flow.shotType) { el.innerHTML = html; return; }

    // ⑨ 必ずコース選択
    html += buildStep(step++, 'コース', flow.course !== null, [
      { val:'C',   label:'C クロス' }, { val:'Co', label:'Co 逆クロス' },
      { val:'M',   label:'M ミドル' }, { val:'RST', label:'右ST' }, { val:'LST', label:'左ST' }
    ], 'course', flow.course);
    if (!flow.course) { el.innerHTML = html; return; }

    flow.winner = flow.player.startsWith('a') ? 'a' : 'b';
    html += buildSummary([flow.serve, `${flow.rally}球`, pName(flow.player), flow.base, flow.shotType, flow.course]);
    html += `<button class="confirm-btn" onclick="commitCurrentFlow()">✔ 確定してポイント追加</button>`;
    el.innerHTML = html; return;
  }

  // ⑫ ミス時: 決着ショット（SA/ReA を除外）
  if (flow.type === 'miss') {
    if (!flow.base) {
      html += buildStep(step++, 'ミスのショット', false, [
        { val:'F', label:'F フォア' },
        { val:'B', label:'B バック' }
      ], 'base', flow.base);
      el.innerHTML = html; return;
    }

    // ⑬ LV追加
    html += buildStep(step++, 'ショット種類', flow.shotType !== null, [
      { val:'St', label:'St ストローク' }, { val:'S',  label:'S スライス' },
      { val:'V',  label:'V ボレー' },      { val:'LV', label:'LV ローボレー' },
      { val:'Hv', label:'Hv ハイボレー' }, { val:'Sm', label:'Sm スマッシュ' }
    ], 'shotType', flow.shotType);
    if (!flow.shotType) { el.innerHTML = html; return; }

    // ⑨ ミス時もコース選択を強制
    html += buildStep(step++, 'コース', flow.course !== null, [
      { val:'C',   label:'C クロス' }, { val:'Co', label:'Co 逆クロス' },
      { val:'M',   label:'M ミドル' }, { val:'RST', label:'右ST' }, { val:'LST', label:'左ST' }
    ], 'course', flow.course);
    if (!flow.course) { el.innerHTML = html; return; }

    // ミスの種類
    html += buildStep(step++, 'ミスの種類', flow.miss !== null, [
      { val:'N',  label:'N ネット',       cls:'choice-miss' },
      { val:'SO', label:'SO サイドアウト', cls:'choice-miss' },
      { val:'BO', label:'BO バックアウト', cls:'choice-miss' },
      { val:'T',  label:'T チップ',       cls:'choice-miss' }
    ], 'miss', flow.miss);
    if (!flow.miss) { el.innerHTML = html; return; }

    flow.winner = flow.player.startsWith('a') ? 'b' : 'a';
    html += buildSummary([flow.serve, `${flow.rally}球`, pName(flow.player), flow.base, flow.shotType, flow.course, flow.miss, `→${flow.winner==='a'?tA:tB}ポイント`]);
    html += `<button class="confirm-btn" onclick="commitCurrentFlow()">✔ 確定してポイント追加</button>`;
    el.innerHTML = html; return;
  }

  el.innerHTML = html;
}

function buildStep(num, label, done, choices, key, selected) {
  const numCls = done ? 'step-num done' : 'step-num';
  let h = `<div class="flow-step">
    <div class="step-label"><span class="${numCls}">${num}</span>${label}</div>
    <div class="choice-grid">`;
  choices.forEach(c => {
    let cls = 'choice-btn' + (c.cls ? ' ' + c.cls : '');
    if (selected === c.val) cls += ' selected';
    h += `<button class="${cls}" onclick="setFlow('${key}','${c.val}')">${c.label}</button>`;
  });
  h += `</div></div>`;
  return h;
}

function buildSummary(parts) {
  return `<div class="flow-summary">${parts.filter(Boolean).map(p=>`<span>${p}</span>`).join(' › ')}</div>`;
}

// ============================================================
// COMMIT POINT — ① ミスの個人記録を確実に反映 ⑱
// ============================================================
function commitCurrentFlow() {
  let winner = null;
  if (flow.player) {
    if (flow.type === 'miss') winner = flow.player.startsWith('a') ? 'b' : 'a';
    else winner = flow.player.startsWith('a') ? 'a' : 'b';
  }
  if (!winner) return;
  flow.winner = winner;
  commitPoint(winner, Object.assign({}, flow));
}

function commitFault() {
  const winner = M.serving === 'a' ? 'b' : 'a';
  commitPoint(winner, { serverKey: flow.serverKey, serve:'fault', rally:null, miss:'DF', type:'miss', player: flow.serverKey, winner });
}

function commitPoint(winner, f) {
  if (!M || M.finished) return;
  stk.push(JSON.parse(JSON.stringify(M)));

  const loser = winner === 'a' ? 'b' : 'a';
  const s = M.stats[winner];
  const ls = M.stats[loser];

  // --- サーブ統計 ---
  const serverKey = f.serverKey || getCurrentServer(); 
  const servingTeam = serverKey.startsWith('a') ? 'a' : 'b'; 
  const servingStats = M.stats[servingTeam];

  // ⑱ 個人統計の初期化を確実に
  if (!servingStats.players) servingStats.players = {};
  if (!servingStats.players[serverKey]) servingStats.players[serverKey] = { pts:0, miss:0, srv1in:0, srv1tot:0, srv2in:0, srv2tot:0, df:0 };
  const servingPS = servingStats.players[serverKey];

  if (f.serve === '1st') {
    servingStats.srv1tot = (servingStats.srv1tot||0) + 1;
    servingPS.srv1tot    = (servingPS.srv1tot||0)    + 1;
    servingStats.srv1in  = (servingStats.srv1in||0)  + 1;
    servingPS.srv1in     = (servingPS.srv1in||0)     + 1;
  } else if (f.serve === '2nd') {
    servingStats.srv1tot = (servingStats.srv1tot||0) + 1;
    servingPS.srv1tot    = (servingPS.srv1tot||0)    + 1;
    servingStats.srv2tot = (servingStats.srv2tot||0) + 1;
    servingStats.srv2in  = (servingStats.srv2in||0)  + 1;
  } else if (f.serve === 'fault') {
    servingStats.srv1tot = (servingStats.srv1tot||0) + 1;
    servingPS.srv1tot    = (servingPS.srv1tot||0)    + 1;
    servingStats.df      = (servingStats.df||0)      + 1;
    servingPS.df         = (servingPS.df||0)         + 1;
    servingStats.srv2tot = (servingStats.srv2tot||0) + 1;
  }

  // --- ラリー統計 ---
  if (f.rally && s.rally) s.rally[f.rally] = (s.rally[f.rally]||0) + 1;

  // --- ① ポイント獲得者の個人統計 ---
  if (f.type === 'point' && f.player) {
    const ptTeam = f.player.startsWith('a') ? 'a' : 'b';
    const ptStats = M.stats[ptTeam];
    if (!ptStats.players) ptStats.players = {};
    if (!ptStats.players[f.player]) ptStats.players[f.player] = { pts:0, miss:0, srv1in:0, srv1tot:0, srv2in:0, srv2tot:0, df:0 };
    ptStats.players[f.player].pts = (ptStats.players[f.player].pts||0) + 1;
  }

  // --- 決着ショット・ショット種類・コース統計 ---
  if (f.base && s.base) s.base[f.base] = (s.base[f.base]||0) + 1;
  if (f.base === 'SA' || f.base === 'ReA') s.ace = (s.ace||0) + 1;
  if (f.shotType) {
    if (s.shotType) s.shotType[f.shotType] = (s.shotType[f.shotType]||0) + 1;
  }
  if (f.course && s.course) s.course[f.course] = (s.course[f.course]||0) + 1;

  if (f.type === 'point') s.win = (s.win||0) + 1;

  // --- ① ミスの個人記録（最重要修正） ---
  if (f.type === 'miss' && f.miss) {
    const misserTeam = f.player ? (f.player.startsWith('a') ? 'a' : 'b') : loser;
    const misserStats = M.stats[misserTeam];
    if (misserStats.miss_type) misserStats.miss_type[f.miss] = (misserStats.miss_type[f.miss]||0) + 1;
    
    // ① 個人ごとのミス本数を確実に記録
    if (f.player) {
      if (!misserStats.players) misserStats.players = {};
      if (!misserStats.players[f.player]) misserStats.players[f.player] = { pts:0, miss:0, srv1in:0, srv1tot:0, srv2in:0, srv2tot:0, df:0 };
      misserStats.players[f.player].miss = (misserStats.players[f.player].miss||0) + 1;
    }
  }

  // --- スコア加算 ---
  s.pts++;
  const cp = M.isFinal ? M.finalPts : M.pts;
  M.pointLog = M.pointLog || [];
  M.pointLog.push({
    winner, serve: f.serve, rally: f.rally, player: f.player, type: f.type,
    base: f.base, shotType: f.shotType, course: f.course, miss: f.miss,
    scoreA: cp.a + (winner === 'a' ? 1 : 0), scoreB: cp.b + (winner === 'b' ? 1 : 0),
    gameA: M.gamesWon.a, gameB: M.gamesWon.b
  });

  resetFlow();
  M.servePointCount = (M.servePointCount || 0) + 1;

  if (M.isFinal) {
    M.finalPts[winner]++;
    if (M.finalPts[winner] >= 7 && M.finalPts[winner] - M.finalPts[loser] >= 2) winGame(winner);
  } else {
    M.pts[winner]++;
    if (M.pts[winner] >= 4 && M.pts[winner] - M.pts[loser] >= 2) winGame(winner);
  }

  window.fbSave(currentCourt, M);
  renderScore();
  renderFlow();
}

function winGame(winner) {
  M.gameLog.push({ winner });
  M.gamesWon[winner]++;
  M.pts = { a:0, b:0 };
  M.servePointCount = 0; 
  M.serving = M.serving === 'a' ? 'b' : 'a';
  if (M.gamesWon[winner] >= M.winGames) { finishMatch(winner); return; }
  const need = M.winGames - 1;
  if (M.gamesWon.a === need && M.gamesWon.b === need) {
    M.isFinal = true; M.finalPts = { a:0, b:0 };
  }
}

async function finishMatch(winner) {
  M.finished = true; 
  M.winner = winner;
  M.endTime = new Date().toISOString();

  await window.fbSave(currentCourt, M);

  if (navigator.onLine && currentEventId) {
    const historyId = Date.now(); 
    try {
      await xhrRequest('PUT', `events/${currentEventId}/history/${historyId}`, M);
    } catch (e) {
      console.error("履歴の保存に失敗:", e);
    }
  }
  const coachTab = document.querySelectorAll('.nav-tab')[1];
  showPage('coach', coachTab);
}

function undoPt() {
  if (!stk.length) return;
  M = stk.pop();
  resetFlow();
  window.fbSave(currentCourt, M);
  renderScore();
  renderFlow();
}

function toggleMode() {
  simpleMode = !simpleMode;
  updateModeUI();
  renderFlow();
}

function updateModeUI() {
  const btn = document.getElementById('mode-btn');
  if (!btn) return;
  if (simpleMode) {
    btn.textContent = '📝 詳細入力';
    btn.style.borderColor = '';
    btn.style.color = '';
    document.getElementById('tap-a-side').onclick = () => simpleTap('a');
    document.getElementById('tap-b-side').onclick = () => simpleTap('b');
    document.getElementById('tap-a-side').style.cursor = 'pointer';
    document.getElementById('tap-b-side').style.cursor = 'pointer';
    document.getElementById('tap-hint-a').style.display = '';
    document.getElementById('tap-hint-b').style.display = '';
  } else {
    btn.textContent = '👆 簡易入力';
    btn.style.borderColor = 'var(--green)';
    btn.style.color = 'var(--green)';
    document.getElementById('tap-a-side').onclick = null;
    document.getElementById('tap-b-side').onclick = null;
    document.getElementById('tap-a-side').style.cursor = 'default';
    document.getElementById('tap-b-side').style.cursor = 'default';
    document.getElementById('tap-hint-a').style.display = 'none';
    document.getElementById('tap-hint-b').style.display = 'none';
  }
}

function simpleTap(winner) {
  if (!M || M.finished || !simpleMode) return;
  stk.push(JSON.parse(JSON.stringify(M)));

  M.servePointCount = (M.servePointCount || 0) + 1;

  if (M.isFinal) {
    M.finalPts[winner]++;
    const loser = winner==='a'?'b':'a';
    if (M.finalPts[winner] >= 7 && M.finalPts[winner] - M.finalPts[loser] >= 2) winGame(winner);
  } else {
    M.pts[winner]++;
    const loser = winner==='a'?'b':'a';
    if (M.pts[winner] >= 4 && M.pts[winner] - M.pts[loser] >= 2) winGame(winner);
  }
  window.fbSave(currentCourt, M);
  renderScore();
}

function toggleServe() {
  if (!M) return;
  stk.push(JSON.parse(JSON.stringify(M)));
  M.serving = M.serving === 'a' ? 'b' : 'a';
  window.fbSave(currentCourt, M);
  renderScore();
}

function endEarly() {
  if (!M) return;
  const w = M.gamesWon.a > M.gamesWon.b ? 'a' : M.gamesWon.b > M.gamesWon.a ? 'b' : null;
  M.finished = true;
  M.winner = w;
  M.endTime = new Date().toISOString();
  window.fbSave(currentCourt, M);
  M = null; stk = [];
  resetFlow();
  const coachTab = document.querySelectorAll('.nav-tab')[1];
  showPage('coach', coachTab);
}

// RENDER SCORE & REFLECT
// ============================================================
function renderScore() {
  if (!M) return;
  const { teams, gamesWon, matchGames, pts, isFinal, finalPts, serving, gameLog } = M;

  document.getElementById('score-label').textContent = `コート ${currentCourt}`;
  document.getElementById('lbl-a').textContent = teams.a.name;
  document.getElementById('lbl-b').textContent = teams.b.name;
  document.getElementById('final-chip').style.display = isFinal ? '' : 'none';
  
  const serverName = getServerName();
  document.getElementById('game-score-disp').textContent = `${gamesWon.a} - ${gamesWon.b}　🎾 ${serverName}`;

  const track = document.getElementById('game-track');
  track.innerHTML = '';
  for (let i = 0; i < matchGames; i++) {
    const dot = document.createElement('div');
    const g = gameLog[i];
    dot.className = 'gdot' + (g ? (g.winner==='a'?' wa':' wb') : (i===gameLog.length&&!isFinal?' cur':''));
    dot.textContent = g ? (g.winner==='a'?'A':'B') : (i===gameLog.length&&!isFinal?i+1:'');
    track.appendChild(dot);
  }
  if (isFinal) {
    const fd = document.createElement('div');
    fd.className = 'gdot fin'; fd.textContent = 'F';
    track.appendChild(fd);
  }

  const cp = isFinal ? finalPts : pts;
  document.getElementById('pt-a').textContent = cp.a;
  document.getElementById('pt-b').textContent = cp.b;

  const db2 = document.getElementById('deuce-strip');
  db2.style.display = 'none';
  const thr = isFinal ? 6 : 3;
  if (cp.a >= thr && cp.b >= thr) {
    db2.style.display = 'block';
    if (cp.a === cp.b) { db2.textContent='DEUCE'; db2.style.color='var(--muted)'; }
    else { const adv=cp.a>cp.b?'a':'b'; db2.textContent=`ADV: ${teams[adv].name}`; db2.style.color=adv==='a'?'var(--a)':'var(--b)'; }
  }
}

function setStar(n) {
  starVal = n;
  document.querySelectorAll('.star').forEach((s,i) => s.classList.toggle('lit', i < n));
}

function saveReflect() {
  if (!M) return;
  M.reflect = {
    stars: starVal,
    good: document.getElementById('r-good').value,
    improve: document.getElementById('r-improve').value,
    goal: document.getElementById('r-goal').value
  };
  window.fbSave(currentCourt, M);
  alert('振り返りを保存しました！');
  document.getElementById('reflect-card').style.display = 'none';
  goStep('court');
}
