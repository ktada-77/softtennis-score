// DASHBOARD & HISTORY — ② DF項目削除
// ============================================================
async function loadDashboard() {
  const eid = currentEventId || 'default';
  const listEl = document.getElementById('coach-list');
  const rankEl = document.getElementById('coach-ranks');
  if (!listEl || !rankEl) return;

  listEl.innerHTML = '<div style="padding:20px;color:var(--muted)">読み込み中...</div>';
  const history = await xhrRequest('GET', `events/${eid}/history`);
  
  if (!history || Object.keys(history).length === 0) {
    listEl.innerHTML = '<div style="padding:20px;color:var(--muted)">終了した試合はまだありません</div>';
    rankEl.innerHTML = '';
    return;
  }

  const matchIds = Object.keys(history).sort((a, b) => b - a);
  listEl.innerHTML = '';

  matchIds.forEach(mid => {
    const m = history[mid];
    listEl.appendChild(buildHistoryCard(m, mid));
  });
}

function buildHistoryCard(d, mid) {
  const wrap = document.createElement('div');
  wrap.className = 'ms-card';

  const timeStr = d.endTime ? new Date(d.endTime).toLocaleString('ja-JP',{hour:'2-digit',minute:'2-digit'}) : '--:--';
  const sa = d.stats.a || {};
  const sb = d.stats.b || {};

  // ② DF項目を削除した playerBlock
  function playerBlock(name, role, teamCls, stats, playerKey) {
    const ps = stats.players && stats.players[playerKey];
    const playerPts = ps ? (ps.pts||0) : 0;
    const s1in  = ps ? (ps.srv1in||0)  : 0;
    const s1tot = ps ? (ps.srv1tot||0) : 0;
    // ① 個人ミスを正しく取得
    const miss = ps ? (ps.miss||0) : 0;
    const pct = s1tot > 0 ? Math.round(s1in/s1tot*100)+'%' : '-';
    
    return `
      <div class="player-block ${teamCls}">
        <div class="pb-head"><span class="pb-name">${name}</span><span class="pb-role">${role}</span></div>
        <div class="pb-row"><span class="pb-lbl">1stサーブ</span><span class="pb-val">${pct} <small>(${s1in}/${s1tot})</small></span></div>
        <div class="pb-row"><span class="pb-lbl">ポイント</span><span class="pb-val">${playerPts}pt</span></div>
        <div class="pb-row"><span class="pb-lbl">ミス</span><span class="pb-val">${miss}回</span></div>
      </div>`;
  }

  const [a1n, a2n] = (d.teams?.a?.players||'後衛A / 前衛A').split(' / ');
  const [b1n, b2n] = (d.teams?.b?.players||'後衛B / 前衛B').split(' / ');

  wrap.innerHTML = `
    <div class="ms-head">
      <span class="ms-court-label">終了: ${timeStr} (${d.matchGames}Gマッチ)</span>
      <button onclick="deleteHistoryMatch('${mid}')" style="font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:var(--font-num);">🗑 削除</button>
    </div>
    <div class="score-line">
      <div class="sl-team sl-a">${d.teams?.a?.name || 'Aペア'}</div>
      <div class="sl-score">${d.gamesWon.a} - ${d.gamesWon.b}</div>
      <div class="sl-team sl-b">${d.teams?.b?.name || 'Bペア'}</div>
    </div>
    <div class="player-grid">
      ${playerBlock(a1n, '後衛', 'pb-team-a', sa, 'a1')}
      ${playerBlock(b1n, '後衛', 'pb-team-b', sb, 'b1')}
      ${playerBlock(a2n, '前衛', 'pb-team-a', sa, 'a2')}
      ${playerBlock(b2n, '前衛', 'pb-team-b', sb, 'b2')}
    </div>
    ${d.reflect ? `
    <div class="rv">
      <div class="ai-head"><span class="ai-badge" style="background:var(--green)">生徒の振り返り</span></div>
      <div class="rv-stars">${'⭐'.repeat(d.reflect.stars||0)}</div>
      ${d.reflect.good?`<div class="rv-block">✅ ${d.reflect.good}</div>`:''}
      ${d.reflect.improve?`<div class="rv-block">📝 ${d.reflect.improve}</div>`:''}
      ${d.reflect.goal?`<div class="rv-block">🎯 ${d.reflect.goal}</div>`:''}
    </div>` : ''}
  `;
  return wrap;
}
async function deleteHistoryMatch(mid) {
  if(!confirm('この試合結果を削除しますか？')) return;
  const eid = currentEventId || 'default';
  try {
    await xhrRequest('DELETE', `events/${eid}/history/${mid}`);
    loadDashboard();
  } catch(e) {
    alert('削除に失敗しました');
  }
}

// ============================================================
// RANKING & STATS — ③④⑤ 反映
// ============================================================
let rankMode = 'individual'; 

async function loadRanking() {
  const el = document.getElementById('ranking-content');
  el.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div>読み込み中...</div>';
  const eid = currentEventId || 'default';
  
  const history = await xhrRequest('GET', `events/${eid}/history`);
  
  if (!history || Object.keys(history).length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🎾</div>まだ完了した試合のデータがありません</div>';
    return;
  }

  const today = new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'2-digit',day:'2-digit'});
  const individuals = {}; 
  const pairs = {};
  // ⑤ 勝率用: 個人の勝敗記録
  const playerWinLoss = {};

  Object.values(history).forEach(d => {
    if (!d || !d.teams) return;

    if (d.startTime) {
      const matchDate = new Date(d.startTime).toLocaleDateString('ja-JP', {year:'numeric',month:'2-digit',day:'2-digit'});
      if (matchDate !== today) return;
    }

    const tA = d.teams.a;
    const tB = d.teams.b;
    const sa = d.stats.a;
    const sb = d.stats.b;
    const aIsOwn = tA.isOwn !== false; // 未設定(旧データ)は自チーム扱い
    const bIsOwn = tB.isOwn !== false;

    // ペア集計（自チームのみ）
    if (aIsOwn) {
      const pairA = tA.name;
      if (!pairs[pairA]) pairs[pairA] = { pts:0, srv1in:0, srv1tot:0, df:0, miss:0 };
      pairs[pairA].pts += sa.pts || 0;
      pairs[pairA].srv1in += sa.srv1in || 0;
      pairs[pairA].srv1tot += sa.srv1tot || 0;
      pairs[pairA].df += sa.df || 0;
      pairs[pairA].miss += (sa.miss_type ? Object.values(sa.miss_type).reduce((s,v)=>s+v,0) : 0);
    }

    if (bIsOwn) {
      const pairB = tB.name;
      if (!pairs[pairB]) pairs[pairB] = { pts:0, srv1in:0, srv1tot:0, df:0, miss:0 };
      pairs[pairB].pts += sb.pts || 0;
      pairs[pairB].srv1in += sb.srv1in || 0;
      pairs[pairB].srv1tot += sb.srv1tot || 0;
      pairs[pairB].df += sb.df || 0;
      pairs[pairB].miss += (sb.miss_type ? Object.values(sb.miss_type).reduce((s,v)=>s+v,0) : 0);
    }

    // 個人集計（自チームのみ）
    const [a1name, a2name] = (tA.players || '').split(' / ');
    const [b1name, b2name] = (tB.players || '').split(' / ');

    const addPlayer = (name, playerKey, stats) => {
      if (!name || name.startsWith('後衛') || name.startsWith('前衛')) return;
      if (!individuals[name]) individuals[name] = { pts:0, srv1in:0, srv1tot:0, df:0, miss:0 };
      const ps = stats.players && stats.players[playerKey];
      if (ps) {
        individuals[name].pts     += ps.pts     || 0;
        individuals[name].srv1in  += ps.srv1in  || 0;
        individuals[name].srv1tot += ps.srv1tot || 0;
        individuals[name].df      += ps.df      || 0;
        individuals[name].miss    += ps.miss    || 0;
      }
    };

    if (aIsOwn) {
      addPlayer(a1name, 'a1', sa);
      addPlayer(a2name, 'a2', sa);
    }
    if (bIsOwn) {
      addPlayer(b1name, 'b1', sb);
      addPlayer(b2name, 'b2', sb);
    }

    // ⑤ 勝率集計（自チームのみ）
    const matchWinner = d.winner; // 'a' or 'b'
    const allPlayers = [
      { name: a1name, team: 'a', isOwn: aIsOwn },
      { name: a2name, team: 'a', isOwn: aIsOwn },
      { name: b1name, team: 'b', isOwn: bIsOwn },
      { name: b2name, team: 'b', isOwn: bIsOwn }
    ];
    allPlayers.forEach(p => {
      if (!p.isOwn) return;
      if (!p.name || p.name.startsWith('後衛') || p.name.startsWith('前衛')) return;
      if (!playerWinLoss[p.name]) playerWinLoss[p.name] = { wins: 0, total: 0 };
      playerWinLoss[p.name].total += 1;
      if (matchWinner && p.team === matchWinner) {
        playerWinLoss[p.name].wins += 1;
      }
    });
  });

  el.innerHTML = `
    <div class="rank-date-label">📅 ${today}</div>
    <div class="rank-tabs">
      <div class="rank-tab ${rankMode==='individual'?'active':''}" onclick="setRankMode('individual',this)">👤 個人</div>
      <div class="rank-tab ${rankMode==='pair'?'active':''}" onclick="setRankMode('pair',this)">👥 ペア</div>
    </div>
    <div id="rank-body"></div>
  `;

  renderRankBody(individuals, pairs, playerWinLoss);
}

function setRankMode(mode, el) {
  rankMode = mode;
  document.querySelectorAll('.rank-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  loadRanking();
}

function renderRankBody(individuals, pairs, playerWinLoss) {
  const el = document.getElementById('rank-body');
  if (!el) return;

  const pct = (i, t) => t > 0 ? Math.round(i/t*100) : 0;
  
  if (rankMode === 'individual') {
    const names = Object.keys(individuals);
    if (!names.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">🎾</div>個人データがありません</div>'; return; }

    // ③ 上位3名まで表示
    const byPts = names.map(n => ({name:n, ...individuals[n]})).sort((a,b) => (b.pts||0) - (a.pts||0)).slice(0,3);
    const bySrv = names.map(n => ({name:n, ...individuals[n]})).filter(x => x.srv1tot >= 1).sort((a,b) => pct(b.srv1in,b.srv1tot) - pct(a.srv1in,a.srv1tot)).slice(0,3);

    // ⑤ 勝率ランキング（上位6名）
    const wlNames = Object.keys(playerWinLoss).filter(n => playerWinLoss[n].total > 0);
    const byWinRate = wlNames.map(n => ({
      name: n,
      wins: playerWinLoss[n].wins,
      total: playerWinLoss[n].total,
      rate: Math.round(playerWinLoss[n].wins / playerWinLoss[n].total * 100)
    })).sort((a,b) => b.rate - a.rate || b.wins - a.wins).slice(0, 6);

    // ④ ミスランキング削除済み、DFランキング削除（②）
    el.innerHTML = [
      buildRankSection('🏆 ポイント獲得数', byPts, x => ({val:x.pts||0, unit:'pt', sub:''}), byPts[0]?.pts||1),
      buildRankSection('🎾 1stサーブ成功率', bySrv, x => ({val:pct(x.srv1in,x.srv1tot)+'%', unit:'', sub:`${x.srv1in}/${x.srv1tot}本`}), 100),
      buildRankSection('📊 プレーヤー勝率', byWinRate, x => ({val:x.rate+'%', unit:'', sub:`${x.wins}勝/${x.total}試合`}), 100)
    ].join('');

  } else {
    const pnames = Object.keys(pairs);
    if (!pnames.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">🎾</div>ペアデータがありません</div>'; return; }

    // ③ 上位3名まで
    const byPtsP = pnames.map(n => ({name:n, ...pairs[n]})).sort((a,b) => (b.pts||0) - (a.pts||0)).slice(0,3);
    const bySrv = pnames.map(n => ({name:n, ...pairs[n]})).filter(x => x.srv1tot >= 1).sort((a,b) => pct(b.srv1in,b.srv1tot) - pct(a.srv1in,a.srv1tot)).slice(0,3);
    // ④ ミスランキング削除

    el.innerHTML = [
      buildRankSection('🏆 ポイント獲得数', byPtsP, x => ({val:x.pts||0, unit:'pt', sub:''}), byPtsP[0]?.pts||1),
      buildRankSection('🎾 1stサーブ成功率', bySrv, x => ({val:pct(x.srv1in,x.srv1tot)+'%', unit:'', sub:`${x.srv1in}/${x.srv1tot}本`}), 100)
    ].join('');
  }
}

function buildRankSection(title, list, valFn, maxVal) {
  const medal = (i) => ['🥇','🥈','🥉','4','5','6'][i]||'';
  const posCls = (i) => i===0?'p1':i===1?'p2':i===2?'p3':'';
  const rows = list.length ? list.map((x,i) => {
    const v = valFn(x);
    const numVal = parseFloat(v.val) || 0;
    const barW = maxVal > 0 ? Math.min(100, Math.round(numVal/maxVal*100)) : 0;
    return `<div class="rank-row">
      <div class="rank-pos ${posCls(i)}">${medal(i)||i+1}</div>
      <div style="flex:1">
        <div class="rank-name">${x.name}</div>
        <div class="rank-sub">${v.sub}</div>
        <div class="rank-bar-wrap"><div class="rank-bar-fill" style="width:${barW}%"></div></div>
      </div>
      <div style="text-align:right">
        <div class="rank-val">${v.val}</div>
        <div class="rank-val-unit">${v.unit}</div>
      </div>
    </div>`;
  }).join('') : `<div style="padding:14px;text-align:center;font-size:12px;color:var(--muted);font-family:var(--font-num)">データがありません</div>`;

  return `<div class="rank-section">
    <div class="rank-section-head"><span class="rank-medal">${title}</span></div>
    <div class="rank-list">${rows}</div>
  </div>`;
}

// ============================================================
// PLAYER STATS — ⑭ 選手別ミス分析
// ============================================================
let statsHistory = null;
let statsPlayerName = null;
let statsPlayerMatches = []; // {matchId, label, pointLog}

async function loadStatsPlayerList() {
  document.getElementById('stats-list-view').style.display = '';
  document.getElementById('stats-detail-view').style.display = 'none';

  const el = document.getElementById('stats-player-list');
  el.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div>読み込み中...</div>';

  const eid = currentEventId || 'default';
  statsHistory = await xhrRequest('GET', `events/${eid}/history`);

  if (!statsHistory || Object.keys(statsHistory).length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🎾</div>まだ完了した試合のデータがありません</div>';
    return;
  }

  const today = new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'2-digit',day:'2-digit'});
  const playerMap = {}; // name -> {wins, total}

  Object.values(statsHistory).forEach(d => {
    if (!d || !d.teams) return;
    if (d.startTime) {
      const matchDate = new Date(d.startTime).toLocaleDateString('ja-JP', {year:'numeric',month:'2-digit',day:'2-digit'});
      if (matchDate !== today) return;
    }
    const allP = [
      { name: (d.teams.a.players||'').split(' / ')[0], team:'a', isOwn: d.teams.a.isOwn !== false },
      { name: (d.teams.a.players||'').split(' / ')[1], team:'a', isOwn: d.teams.a.isOwn !== false },
      { name: (d.teams.b.players||'').split(' / ')[0], team:'b', isOwn: d.teams.b.isOwn !== false },
      { name: (d.teams.b.players||'').split(' / ')[1], team:'b', isOwn: d.teams.b.isOwn !== false }
    ];
    allP.forEach(p => {
      if (!p.isOwn) return;
      if (!p.name || p.name.startsWith('後衛') || p.name.startsWith('前衛')) return;
      if (!playerMap[p.name]) playerMap[p.name] = { wins:0, total:0 };
      playerMap[p.name].total++;
      if (d.winner && p.team === d.winner) playerMap[p.name].wins++;
    });
  });

  const names = Object.keys(playerMap).sort((a,b) => {
    const ra = playerMap[b].total > 0 ? playerMap[b].wins/playerMap[b].total : 0;
    const rb = playerMap[a].total > 0 ? playerMap[a].wins/playerMap[a].total : 0;
    return ra - rb;
  });

  if (!names.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🎾</div>選手データがありません</div>';
    return;
  }

  el.innerHTML = names.map(n => {
    const pw = playerMap[n];
    const rate = pw.total > 0 ? Math.round(pw.wins/pw.total*100) : 0;
    return `<div class="stats-player-card" onclick="openStatsDetail('${n}')">
      <div>
        <div class="spc-name">${n}</div>
        <div class="spc-rate-sub">${pw.wins}勝 / ${pw.total}試合</div>
      </div>
      <div style="text-align:right">
        <div class="spc-rate">${rate}%</div>
        <div class="spc-rate-sub">勝率</div>
      </div>
    </div>`;
  }).join('');
}

function backToStatsList() {
  document.getElementById('stats-list-view').style.display = '';
  document.getElementById('stats-detail-view').style.display = 'none';
}

function openStatsDetail(name) {
  statsPlayerName = name;
  document.getElementById('stats-list-view').style.display = 'none';
  document.getElementById('stats-detail-view').style.display = '';
  document.getElementById('stats-player-name').textContent = `📊 ${name} のミス分析`;

  // この選手が出場した試合を抽出
  const today = new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'2-digit',day:'2-digit'});
  statsPlayerMatches = [];
  let matchCount = 0;

  Object.entries(statsHistory).forEach(([mid, d]) => {
    if (!d || !d.teams) return;
    if (d.startTime) {
      const matchDate = new Date(d.startTime).toLocaleDateString('ja-JP', {year:'numeric',month:'2-digit',day:'2-digit'});
      if (matchDate !== today) return;
    }
    const allNames = [
      (d.teams.a.players||'').split(' / ')[0],
      (d.teams.a.players||'').split(' / ')[1],
      (d.teams.b.players||'').split(' / ')[0],
      (d.teams.b.players||'').split(' / ')[1]
    ];
    // この選手のplayerKeyを特定（自チームのみ）
    let playerKey = null;
    const aIsOwn = d.teams.a.isOwn !== false;
    const bIsOwn = d.teams.b.isOwn !== false;
    if (aIsOwn && allNames[0] === name) playerKey = 'a1';
    else if (aIsOwn && allNames[1] === name) playerKey = 'a2';
    else if (bIsOwn && allNames[2] === name) playerKey = 'b1';
    else if (bIsOwn && allNames[3] === name) playerKey = 'b2';

    if (playerKey) {
      matchCount++;
      const timeStr = d.endTime ? new Date(d.endTime).toLocaleString('ja-JP',{hour:'2-digit',minute:'2-digit'}) : '--:--';
      const vs = playerKey.startsWith('a') ? d.teams.b.name : d.teams.a.name;
      const won = d.winner === (playerKey.startsWith('a') ? 'a' : 'b');
      statsPlayerMatches.push({
        matchId: mid,
        label: `第${matchCount}試合 ${timeStr} vs ${vs} ${won?'⭕':'❌'}`,
        pointLog: d.pointLog || [],
        playerKey
      });
    }
  });

  // フィルター更新
  const sel = document.getElementById('stats-match-filter');
  sel.innerHTML = '<option value="all">すべての試合</option>';
  statsPlayerMatches.forEach((m, i) => {
    sel.innerHTML += `<option value="${i}">${m.label}</option>`;
  });

  renderStatsDetail();
}

function renderStatsDetail() {
  const el = document.getElementById('stats-charts');
  const filterVal = document.getElementById('stats-match-filter').value;

  // 対象のpointLogとplayerKeyを集める
  let missPoints = [];
  if (filterVal === 'all') {
    statsPlayerMatches.forEach(m => {
      m.pointLog.forEach(p => {
        if (p.type === 'miss' && p.player === m.playerKey) {
          missPoints.push(p);
        }
      });
    });
  } else {
    const m = statsPlayerMatches[parseInt(filterVal)];
    if (m) {
      m.pointLog.forEach(p => {
        if (p.type === 'miss' && p.player === m.playerKey) {
          missPoints.push(p);
        }
      });
    }
  }

  if (missPoints.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">✨</div>ミスのデータがありません<br>（素晴らしい！）</div>';
    return;
  }

  el.innerHTML = '';
  el.appendChild(buildChart1_ShotMiss(missPoints));
  el.appendChild(buildChart2_HeatMatrix(missPoints));
  el.appendChild(buildChart3_RallyHist(missPoints));
  el.appendChild(buildChart4_Donut(missPoints));
}

// ① ショット別 × ミス原因（積み上げ横棒グラフ）
function buildChart1_ShotMiss(points) {
  const shotTypes = ['St','S','V','LV','Hv','Sm'];
  const shotLabels = {St:'ストローク',S:'スライス',V:'ボレー',LV:'ローボレー',Hv:'ハイボレー',Sm:'スマッシュ'};
  const missTypes = ['N','SO','BO','T'];
  const missLabels = {N:'ネット',SO:'サイドアウト',BO:'バックアウト',T:'チップ'};
  const missColors = {N:'#e85454',SO:'#f0a030',BO:'#5080d0',T:'#8b6cc0'};

  const data = {};
  shotTypes.forEach(s => { data[s] = {}; missTypes.forEach(m => data[s][m] = 0); });
  points.forEach(p => {
    const st = p.shotType || 'St';
    const ms = p.miss || 'N';
    if (data[st]) data[st][ms] = (data[st][ms]||0) + 1;
  });

  // ショットにデータがあるもののみ表示
  const activeShots = shotTypes.filter(s => missTypes.some(m => data[s][m] > 0));
  const maxTotal = Math.max(1, ...activeShots.map(s => missTypes.reduce((sum,m) => sum + data[s][m], 0)));

  const card = document.createElement('div');
  card.className = 'stats-card';

  let legendHtml = `<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px">`;
  missTypes.forEach(m => {
    legendHtml += `<div style="display:flex;align-items:center;gap:4px;font-size:11px;font-family:var(--font-num)"><div style="width:12px;height:12px;border-radius:2px;background:${missColors[m]}"></div>${missLabels[m]}</div>`;
  });
  legendHtml += `</div>`;

  let barsHtml = '';
  activeShots.forEach(s => {
    const total = missTypes.reduce((sum,m) => sum + data[s][m], 0);
    let segs = '';
    missTypes.forEach(m => {
      if (data[s][m] > 0) {
        const w = Math.round(data[s][m] / maxTotal * 100);
        segs += `<div class="hbar-seg" style="width:${w}%;background:${missColors[m]}" title="${missLabels[m]}: ${data[s][m]}"></div>`;
      }
    });
    barsHtml += `<div class="hbar-row">
      <div class="hbar-label">${shotLabels[s]||s}</div>
      <div class="hbar-track">${segs}</div>
      <div class="hbar-val">${total}</div>
    </div>`;
  });

  card.innerHTML = `<div class="stats-card-head">① ショット別 × ミス原因</div>
    <div class="stats-card-body">${legendHtml}${barsHtml || '<div style="text-align:center;color:var(--muted);font-size:12px">データなし</div>'}</div>`;
  return card;
}

// ② ショット別 × コース（ヒートマップ表）
function buildChart2_HeatMatrix(points) {
  const bases = ['F','B'];
  const baseLabels = {F:'フォア',B:'バック'};
  const shotTypes = ['St','S','V','LV','Hv','Sm'];
  const shotLabels = {St:'ストローク',S:'スライス',V:'ボレー',LV:'ローボレー',Hv:'ハイボレー',Sm:'スマッシュ'};
  const courses = ['C','Co','M','RST','LST'];
  const courseLabels = {C:'クロス',Co:'逆クロス',M:'ミドル',RST:'右ST',LST:'左ST'};

  // 行 = base+shotType, 列 = course
  const rows = [];
  bases.forEach(b => {
    shotTypes.forEach(s => {
      rows.push({ key: b+'_'+s, label: baseLabels[b]+' '+shotLabels[s] });
    });
  });

  const data = {};
  rows.forEach(r => { data[r.key] = {}; courses.forEach(c => data[r.key][c] = 0); });

  points.forEach(p => {
    const b = p.base || '';
    const s = p.shotType || '';
    const c = p.course || '';
    const key = b+'_'+s;
    if (data[key] && data[key][c] !== undefined) data[key][c]++;
  });

  // データがある行のみ
  const activeRows = rows.filter(r => courses.some(c => data[r.key][c] > 0));
  const allVals = activeRows.flatMap(r => courses.map(c => data[r.key][c]));
  const maxVal = Math.max(1, ...allVals);

  const heatClass = (v) => {
    if (v === 0) return 'heat-0';
    const ratio = v / maxVal;
    if (ratio <= 0.25) return 'heat-1';
    if (ratio <= 0.5) return 'heat-2';
    if (ratio <= 0.75) return 'heat-3';
    return 'heat-4';
  };

  const card = document.createElement('div');
  card.className = 'stats-card';

  let tableHtml = `<table class="heat-table"><thead><tr><th></th>`;
  courses.forEach(c => { tableHtml += `<th>${courseLabels[c]}</th>`; });
  tableHtml += `</tr></thead><tbody>`;

  if (activeRows.length === 0) {
    tableHtml += `<tr><td colspan="${courses.length+1}" style="text-align:center;color:var(--muted);padding:14px">データなし</td></tr>`;
  } else {
    activeRows.forEach(r => {
      tableHtml += `<tr><td style="text-align:right;font-weight:600;font-size:10px;white-space:nowrap">${r.label}</td>`;
      courses.forEach(c => {
        const v = data[r.key][c];
        tableHtml += `<td class="${heatClass(v)}">${v>0?v:''}</td>`;
      });
      tableHtml += `</tr>`;
    });
  }
  tableHtml += `</tbody></table>`;

  card.innerHTML = `<div class="stats-card-head">② ショット × コース（ヒートマップ）</div>
    <div class="stats-card-body">${tableHtml}</div>`;
  return card;
}

// ③ ラリー本数別ミス（棒グラフ）
function buildChart3_RallyHist(points) {
  const rallyKeys = ['1','2','3','4','5','6+'];
  const rallyData = {};
  rallyKeys.forEach(k => rallyData[k] = 0);

  points.forEach(p => {
    const r = p.rally || '1';
    if (rallyData[r] !== undefined) rallyData[r]++;
    else rallyData['6+']++;
  });

  const maxVal = Math.max(1, ...Object.values(rallyData));

  const card = document.createElement('div');
  card.className = 'stats-card';

  let barsHtml = `<div class="rally-bar-wrap">`;
  rallyKeys.forEach(k => {
    const v = rallyData[k];
    const h = v > 0 ? Math.max(8, Math.round(v / maxVal * 100)) : 0;
    barsHtml += `<div class="rally-bar-col">
      <div class="rally-bar-num">${v>0?v:''}</div>
      <div class="rally-bar" style="height:${h}%"></div>
      <div class="rally-bar-lbl">${k}本</div>
    </div>`;
  });
  barsHtml += `</div>`;

  card.innerHTML = `<div class="stats-card-head">③ ラリー本数別のミス回数</div>
    <div class="stats-card-body">${barsHtml}</div>`;
  return card;
}

// ④ ミスの総合割合（ドーナツグラフ）
function buildChart4_Donut(points) {
  const missTypes = ['N','SO','BO','T'];
  const missLabels = {N:'ネット',SO:'サイドアウト',BO:'バックアウト',T:'チップ'};
  const missColors = {N:'#e85454',SO:'#f0a030',BO:'#5080d0',T:'#8b6cc0'};

  const data = {};
  missTypes.forEach(m => data[m] = 0);
  points.forEach(p => {
    const ms = p.miss || 'N';
    if (data[ms] !== undefined) data[ms]++;
  });
  const total = Math.max(1, missTypes.reduce((s,m) => s + data[m], 0));

  // SVGドーナツ
  const size = 140;
  const cx = size/2, cy = size/2, r = 52, stroke = 18;
  const circumference = 2 * Math.PI * r;
  let offset = 0;
  let arcs = '';

  missTypes.forEach(m => {
    if (data[m] === 0) return;
    const pct = data[m] / total;
    const len = circumference * pct;
    arcs += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${missColors[m]}" stroke-width="${stroke}" stroke-dasharray="${len} ${circumference - len}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})" />`;
    offset += len;
  });

  const svgHtml = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${stroke}" />
    ${arcs}
    <text x="${cx}" y="${cy-4}" text-anchor="middle" fill="var(--ink)" font-family="var(--font-num)" font-size="20" font-weight="800">${total}</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" fill="var(--muted)" font-family="var(--font-num)" font-size="9">TOTAL MISS</text>
  </svg>`;

  let legendHtml = `<div class="donut-legend">`;
  missTypes.forEach(m => {
    if (data[m] === 0) return;
    const pct = Math.round(data[m]/total*100);
    legendHtml += `<div class="donut-legend-item">
      <div class="donut-legend-color" style="background:${missColors[m]}"></div>
      <span>${missLabels[m]}</span>
      <span style="font-weight:800;margin-left:auto">${data[m]}回 (${pct}%)</span>
    </div>`;
  });
  legendHtml += `</div>`;

  const card = document.createElement('div');
  card.className = 'stats-card';
  card.innerHTML = `<div class="stats-card-head">④ ミスの総合割合</div>
    <div class="stats-card-body"><div class="donut-wrap">${svgHtml}${legendHtml}</div></div>`;
  return card;
}
